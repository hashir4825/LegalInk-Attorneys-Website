<nav
  class="navbar navbar-transition"
  [class.navbar-hidden]="!visible"
  [class.navbar-visible]="visible">

  <div class="navbar-container">

    <div class="navbar-inner">

      <!-- ==========================================
           LOGO
      ========================================== -->

      <a
        routerLink="/"
        class="navbar-brand">

        <div class="logo-wrapper">

          <div class="logo-glow"></div>

          <div class="logo-circle">

            <div class="logo-image"></div>

          </div>

        </div>

        <div class="brand-text">

          <h1>

            Legalink Attorneys

          </h1>

          <p>

            Approachable • Excellence • Innovative

          </p>

        </div>

      </a>

      <!-- ==========================================
           DESKTOP NAVIGATION
      ========================================== -->

      <div class="desktop-menu">

        <!-- Home -->

        <a
          routerLink="/"
          class="nav-link">

          Home

        </a>

        <!-- Lawyers -->

        <a
          routerLink="/lawyers"
          class="nav-link">

          Lawyers

        </a>

        <!-- ==========================================
             PRACTICE AREAS
        ========================================== -->

        <div
          class="mega-wrapper"
          (mouseenter)="openMegaMenu()"
          (mouseleave)="closeMegaMenu()">

          <a
            routerLink="/practice-areas"
            class="nav-link">

            Practice Areas

          </a>

          <!-- Mega Menu -->

          <div
            class="mega-menu"
            *ngIf="megaMenuOpen"
            (click)="closeMenu()">

            <!-- Left Panel -->

            <div class="mega-left">

              <div
                class="category-item"
                *ngFor="let category of practiceAreas"
                [class.active]="activeCategory.slug === category.slug"
                (mouseenter)="setActiveCategory(category)">

                <span>

                  {{ category.title }}

                </span>

                <i class="fas fa-angle-right"></i>

              </div>

            </div>

            <!-- Right Panel -->

            <div class="mega-right">

              <h3>

                {{ activeCategory.title }}

              </h3>

              <div class="submenu">

                <a
                  *ngFor="let item of activeCategory.children"
                  [routerLink]="[
                    '/practice-areas',
                    activeCategory.slug,
                    item.slug
                  ]"
                  class="submenu-link">

                  {{ item.title }}

                </a>

              </div>

              <div class="view-all-wrapper">

                <a
                  routerLink="/practice-areas"
                  class="view-all">

                  View All Practice Areas

                  <i class="fas fa-arrow-right"></i>

                </a>

              </div>

            </div>

          </div>

        </div>

        <!-- Contact -->

        <a
          routerLink="/"
          fragment="contact"
          class="nav-link">

          Contact

        </a>

      </div>

      <!-- ==========================================
           MOBILE MENU BUTTON
      ========================================== -->

      <button
        class="mobile-toggle"
        (click)="toggleMenu()">

        <i
          class="fas"
          [class.fa-bars]="!mobileMenuOpen"
          [class.fa-times]="mobileMenuOpen">
        </i>

      </button>

    </div>

  </div>

  <!-- ==========================================
       MOBILE MENU
  ========================================== -->

  <div
    *ngIf="mobileMenuOpen"
    class="mobile-menu">

    <a
      routerLink="/"
      (click)="mobileMenuOpen=false"
      class="mobile-link">

      Home

    </a>

    <a
      routerLink="/lawyers"
      (click)="mobileMenuOpen=false"
      class="mobile-link">

      Lawyers

    </a>

    <a
      routerLink="/practice-areas"
      (click)="mobileMenuOpen=false"
      class="mobile-link">

      Practice Areas

    </a>

    <a
      routerLink="/"
      fragment="contact"
      (click)="mobileMenuOpen=false"
      class="mobile-link">

      Contact

    </a>

  </div>

</nav>
