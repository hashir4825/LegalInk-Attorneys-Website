<nav
  class="fixed top-0 left-0 w-full z-50 bg-[#08111f]/95 backdrop-blur-xl border-b border-white/10 shadow-2xl navbar-transition"
  [class.navbar-hidden]="!visible"
  [class.navbar-visible]="visible">

  <div class="max-w-7xl mx-auto px-6">

    <div class="flex justify-between items-center h-20">

      <!-- Logo -->

      <a routerLink="/" class="flex items-center gap-4 group">

        <div class="relative">
          <div class="absolute inset-0 bg-green-400/30 rounded-full blur-md group-hover:bg-green-400/50 transition"></div>

          <div class="relative bg-white p-1 rounded-full shadow-lg">
            <div class="bg-[url('/Assets/images/logo.jpeg')] bg-cover bg-center w-14 h-14 rounded-full"></div>
          </div>
        </div>

        <div>
          <h1 class="text-2xl font-bold font-poppins text-white tracking-wide leading-tight">
            Legalink Attorneys
          </h1>

          <p class="text-xs text-green-400 font-medium tracking-[0.18em] uppercase">
            Approachable • Excellence • Innovative
          </p>
        </div>

      </a>

      <!-- Desktop Menu -->

      <div class="hidden lg:flex items-center gap-8">

        <a
          routerLink="/"
          class="relative text-sm font-semibold tracking-wide text-slate-200 hover:text-green-400 transition duration-300 after:absolute after:left-0 after:-bottom-2 after:w-0 after:h-[2px] after:bg-green-400 after:transition-all after:duration-300 hover:after:w-full">
          Home
        </a>

        <a
          routerLink="/lawyers"
          class="relative text-sm font-semibold tracking-wide text-slate-200 hover:text-green-400 transition duration-300 after:absolute after:left-0 after:-bottom-2 after:w-0 after:h-[2px] after:bg-green-400 after:transition-all after:duration-300 hover:after:w-full">
          Lawyers
        </a>

        <a
          routerLink="/"
          fragment="about"
          class="relative text-sm font-semibold tracking-wide text-slate-200 hover:text-green-400 transition duration-300 after:absolute after:left-0 after:-bottom-2 after:w-0 after:h-[2px] after:bg-green-400 after:transition-all after:duration-300 hover:after:w-full">
          Practice Areas
        </a>

        <a
          routerLink="/"
          fragment="contact"
          class="relative text-sm font-semibold tracking-wide text-slate-200 hover:text-green-400 transition duration-300 after:absolute after:left-0 after:-bottom-2 after:w-0 after:h-[2px] after:bg-green-400 after:transition-all after:duration-300 hover:after:w-full">
          Contact
        </a>

        <a
          routerLink="/"
          fragment="contact"
          class="bg-[#d9a45f] text-[#08111f] px-6 py-3 rounded-xl font-bold shadow-lg shadow-[#d9a45f]/20 hover:bg-green-500 hover:text-white hover:-translate-y-1 transition duration-300">

          Book Consultation

        </a>

      </div>

      <!-- Mobile Hamburger -->

      <button
        class="lg:hidden text-white text-3xl"
        (click)="toggleMenu()">

        <i
          class="fas"
          [class.fa-bars]="!mobileMenuOpen"
          [class.fa-times]="mobileMenuOpen">
        </i>

      </button>

    </div>

  </div>

  <!-- Mobile Menu -->

  <div
    *ngIf="mobileMenuOpen"
    class="lg:hidden bg-[#08111f] border-t border-white/10">

    <a
      routerLink="/"
      (click)="mobileMenuOpen=false"
      class="block px-6 py-4 text-white hover:bg-white/5">
      Home
    </a>

    <a
      routerLink="/lawyers"
      (click)="mobileMenuOpen=false"
      class="block px-6 py-4 text-white hover:bg-white/5">
      Lawyers
    </a>

    <a
      routerLink="/"
      fragment="about"
      (click)="mobileMenuOpen=false"
      class="block px-6 py-4 text-white hover:bg-white/5">
      Practice Areas
    </a>

    <a
      routerLink="/"
      fragment="contact"
      (click)="mobileMenuOpen=false"
      class="block px-6 py-4 text-white hover:bg-white/5">
      Contact
    </a>

    <div class="p-4">

      <a
        routerLink="/"
        fragment="contact"
        (click)="mobileMenuOpen=false"
        class="block text-center bg-[#d9a45f] text-[#08111f] py-3 rounded-xl font-bold">

        Book Consultation

      </a>

    </div>

  </div>

</nav>
